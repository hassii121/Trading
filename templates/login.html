<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HASSII Institute — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0d12; --bg2: #0f1319; --bg3: #151b24;
      --border2: #253040; --text: #cdd6e0; --text2: #6b7f93;
      --accent: #00b4d8; --red: #ff4d6d;
      --font: 'Courier New', 'Consolas', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,180,216,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.04) 1px,transparent 1px); background-size: 40px 40px; animation: gridPan 20s linear infinite; pointer-events: none; }
    @keyframes gridPan { 0%{background-position:0 0} 100%{background-position:40px 40px} }
    .center { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .brand { text-align: center; margin-bottom: 40px; }
    .hex-icon { font-size: 44px; color: var(--accent); display: block; margin-bottom: 14px; filter: drop-shadow(0 0 20px rgba(0,180,216,0.5)); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .brand-title { font-size: 26px; font-weight: 700; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; }
    .brand-sub { font-size: 10px; letter-spacing: 3px; color: var(--text2); margin-top: 8px; text-transform: uppercase; }
    .card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 36px 40px; width: 100%; max-width: 400px; }
    .card-title { font-size: 9px; letter-spacing: 4px; color: var(--text2); text-transform: uppercase; text-align: center; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px; padding: 13px 16px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text2); font-size: 12px; }
    .btn { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .btn:hover { background: rgba(0,180,216,0.1); }
    .error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); border-radius: 6px; color: var(--red); font-size: 11px; text-align: center; padding: 10px; margin-bottom: 16px; }
    .link-row { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text2); }
    .link-row a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="center">
  <div class="brand">
    <span class="hex-icon">⬡</span>
    <div class="brand-title">HASSII Institute</div>
    <div class="brand-sub">Institutional Market Analysis</div>
  </div>
  <div class="card">
    <div class="card-title">Sign In</div>
    {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="field"><input type="email" name="email" placeholder="Email address" autofocus required/></div>
      <div class="field"><input type="password" name="password" placeholder="Password" required/></div>
      <button class="btn" type="submit">Login</button>
    </form>
    <div class="link-row">Don't have an account? <a href="/register">Register</a></div>
  </div>
</div>
</body>
</html>
